<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Join — She Can Foundation</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Cormorant+Garamond:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-row">
      <a class="brand" href="index.html">She <span>Can</span></a>
      <nav class="main-nav" id="mainNav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="join.html" class="cta">Join / Volunteer</a>
      </nav>
      <button id="mobileToggle" class="mobile-toggle">☰</button>
    </div>
  </header>

  <main>
    <section class="container join-hero">
      <h1>Volunteer / Join Us</h1>
      <p class="lead">Share your skills, time, or voice — help women rewrite their stories.</p>

      <form id="volunteerForm" class="volunteer-form">
        <div class="form-row">
          <input type="text" name="name" placeholder="Full name" required>
          <input type="email" name="email" placeholder="Email address" required>
        </div>
        <select name="interest">
          <option>Mentorship</option>
          <option>Teaching / Training</option>
          <option>Event Support</option>
          <option>Fundraising</option>
          <option>Digital / Remote</option>
        </select>
        <textarea name="message" placeholder="Tell us about your experience (optional)"></textarea>
        <button class="btn btn-primary" type="submit">Sign Up</button>
      </form>

      <div class="thankyou" id="thankyouMsg" aria-live="polite" hidden>
        <h3>Thank you!</h3>
        <p>We've received your interest. We'll reach out soon.</p>
        <a href="index.html" class="btn btn-ghost">Back to Home</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>© 2026 She Can Foundation — All rights reserved.</div>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
      </nav>
    </div>
  </footer>

  <script src="../js/main.js"></script>
</body>
</html>
